name: Keep Render Awake

on:
  schedule:
    # Toutes les 14 minutes (Render met en veille après 15 min d'inactivité)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Permet de lancer manuellement si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://elijahgod.onrender.com/api/health)
          echo "✅ Health check → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Le backend a répondu $STATUS (cold start en cours ?)"
          fi
