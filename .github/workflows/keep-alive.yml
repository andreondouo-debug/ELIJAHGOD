name: Keep Render Awake

on:
  # Désactivé — consomme les heures gratuites Render trop vite avec 2 services
  # schedule:
  #   - cron: '*/14 * * * *'
  workflow_dispatch: # Lancer manuellement uniquement si besoin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://elijahgod-backend.onrender.com/api/health)
          echo "✅ Health check → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Le backend a répondu $STATUS (cold start en cours ?)"
          fi
